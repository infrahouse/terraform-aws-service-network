[bumpversion]
current_version = 3.2.2
commit = True
tag = True
tag_name = {new_version}
message = chore: bump version to {new_version}

[bumpversion:file:README.md]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:locals.tf]
search = module_version = "{current_version}"
replace = module_version = "{new_version}"

[bumpversion:file:examples/management-network/main.tf]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:examples/service-network/main.tf]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:docs/index.md]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:docs/getting-started.md]
search = version = "{current_version}"
replace = version = "{new_version}"
